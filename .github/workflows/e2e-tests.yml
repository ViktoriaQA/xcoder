name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: olimpx_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm ci
        cd frontend && npm ci
        cd ../backend && npm ci
    
    - name: Setup environment variables
      run: |
        cp .env.example .env
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/olimpx_test" >> .env
        echo "NODE_ENV=test" >> .env
        echo "BASE_URL=http://localhost:5173" >> .env
    
    - name: Setup Playwright
      run: npm run test:e2e:install
    
    - name: Build application
      run: |
        npm run build:backend
        npm run build:frontend
    
    - name: Run database migrations
      run: |
        cd backend
        npm run migrate:test
    
    - name: Start application
      run: |
        npm run dev &
        sleep 30
    
    - name: Wait for application to be ready
      run: |
        timeout 60 bash -c 'until curl -f http://localhost:5173; do sleep 2; done'
    
    - name: Run E2E tests
      run: npm run test:e2e
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    
    - name: Upload screenshots
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-screenshots
        path: test-results/screenshots/
        retention-days: 30
    
    - name: Upload videos
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-videos
        path: test-results/videos/
        retention-days: 30
    
    - name: Publish Test Report
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./playwright-report
        destination_dir: test-reports/${{ github.run_number }}
        keep_files: true
    
    - name: Update Test Reports Index
      if: always()
      run: |
        mkdir -p test-reports-index
        cat > test-reports-index/index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
    <title>Test Reports</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #333; }
        .report { margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .report a { text-decoration: none; color: #0066cc; }
        .report a:hover { text-decoration: underline; }
        .timestamp { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>E2E Test Reports</h1>
    <div class="report">
        <a href="test-reports/${{ github.run_number }}/index.html">
            Test Report #${{ github.run_number }} - ${{ github.sha }}
        </a>
        <div class="timestamp">Run on: $(date -u)</div>
        <div class="timestamp">Branch: ${{ github.ref_name }}</div>
        <div class="timestamp">Commit: ${{ github.sha }}</div>
    </div>
</body>
</html>
EOF
    
    - name: Publish Test Reports Index
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./test-reports-index
        destination_dir: .
        keep_files: true
