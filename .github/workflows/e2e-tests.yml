name: E2E Tests

on:
  push:
    branches: [ main, develop, stage ]
  pull_request:
    branches: [ main, develop, stage ]

permissions:
  contents: write

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: olimpx_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm ci
        cd frontend && npm ci
        cd ../backend && npm ci
    
    - name: Setup environment variables
      run: |
        cp .env.example .env
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/olimpx_test" >> .env
        echo "NODE_ENV=test" >> .env
        echo "BASE_URL=http://localhost:5173" >> .env
    
    - name: Setup Playwright
      run: npm run test:e2e:install
    
    - name: Build application
      run: |
        npm run build:backend
        npm run build:frontend
    
    - name: Run database migrations
      run: |
        cd backend
        npx supabase db push --db-url "$DATABASE_URL" || echo "Migrations may already be applied"
        # Alternative: Apply migrations directly using psql
        for migration in supabase/migrations/*.sql; do
          echo "Applying migration: $migration"
          psql "$DATABASE_URL" -f "$migration" || echo "Migration $migration may already be applied"
        done
    
    - name: Start application
      run: |
        npm run dev &
        sleep 30
    
    - name: Wait for application to be ready
      run: |
        timeout 60 bash -c 'until curl -f http://localhost:5173; do sleep 2; done'
    
    - name: Run E2E tests
      run: npm run test:e2e
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ github.run_number }}
        path: playwright-report/
        retention-days: 30
    
    - name: Upload screenshots
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-screenshots-${{ github.run_number }}
        path: test-results/screenshots/
        retention-days: 30
    
    - name: Upload videos
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-videos-${{ github.run_number }}
        path: test-results/videos/
        retention-days: 30
    
    - name: Test Summary
      if: always()
      run: |
        echo "# 🧪 E2E Test Results" >> $GITHUB_STEP_SUMMARY
        echo "## 📊 Test Report Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- 📄 [HTML Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
        echo "- 📸 [Screenshots](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
        echo "- 🎥 [Videos](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📋 How to View Reports" >> $GITHUB_STEP_SUMMARY
        echo "1. Go to **Actions** tab" >> $GITHUB_STEP_SUMMARY
        echo "2. Click on the workflow run" >> $GITHUB_STEP_SUMMARY
        echo "3. Download artifacts from the bottom" >> $GITHUB_STEP_SUMMARY
        echo "4. Extract and open \`index.html\` in browser" >> $GITHUB_STEP_SUMMARY
